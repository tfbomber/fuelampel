name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project (Expo Prebuild)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Grant Gradle execute permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Android APK (Release)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version from app.json
        id: version
        run: echo "VERSION=$(node -p "require('./app.json').expo.version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: FuelAmpel v${{ steps.version.outputs.VERSION }}
          body: |
            ## ⛽ FuelAmpel v${{ steps.version.outputs.VERSION }}

            ### 本次更新 (What's New)
            - 🗺️ Stations 地图视图 — MapLibre + CARTO 深色地图，价格气泡，点击弹出详情
            - ⚡ 油价三合一缓存 — E5/E10/Diesel 一次 API 全拉取，切换类型 < 1ms 零延迟
            - 📍 Stations 搜索升级 — 支持城市名/地址（自动降级 Nominatim→Photon），含 abort 保护
            - 📳 Haptics 触感反馈 — 油价切换、Getankt 确认、TankConfirm 按钮
            - ✨ 油量条 Reanimated 动画 — withSpring 平滑过渡
            - 🐛 修复地址搜索 spinner 在 onBlur/onClear 时未取消的问题

            ### 安装方法 (Installation)
            1. 下载附件中的 `app-release.apk`
            2. 手机允许"安装未知来源应用"
            3. 点开 APK 直接安装
          files: android/app/build/outputs/apk/release/app-release.apk
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
