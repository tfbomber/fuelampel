name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project (Expo Prebuild)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Grant Gradle execute permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Android APK (Release)
        working-directory: android
        env:
          # Fix: JVM Metaspace OOM caused packageRelease to crash (512MB default is insufficient)
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError"
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Get version from app.json
        id: version
        run: echo "VERSION=$(node -p "require('./app.json').expo.version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: FuelAmpel v${{ steps.version.outputs.VERSION }}
          body: |
            ## ⛽ FuelAmpel v${{ steps.version.outputs.VERSION }}

            ### 🆕 本次更新 — UI/UX 稳定性修复 (v2.8.5)
            - ⏱️ **撤销交互防冲突** — 解耦“撤销”按钮与动画，引入 6 秒独立定时器防止竞态条件
            - 📊 **智能里程计算** — 油量条支持基于置信度（≥0.5）的智能续航里程推算，低置信度回退到安全百分比
            - ⚙️ **渐进式设置界面** — 重构高级设置界面（Progressive Disclosure），折叠次要参数降低视觉负担
            - 🗺️ **地图区域智能搜索** — 地图滑动后新增“搜寻此区域”按钮，精准触发周边站点获取
            - 🎨 **黑客美学对比度提升** — 严格执行 WCAG AA 标准，提亮所有深色模式下的辅助性文字，提升强光可读性

            ### 安装方法 (Installation)
            1. 下载附件中的 `app-release.apk`
            2. 手机允许「安装未知来源应用」
            3. 点开 APK 直接安装
          files: android/app/build/outputs/apk/release/app-release.apk
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
