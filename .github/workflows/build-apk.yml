name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project (Expo Prebuild)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Grant Gradle execute permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Android APK (Release)
        working-directory: android
        env:
          # Fix: JVM Metaspace OOM caused packageRelease to crash (512MB default is insufficient)
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError"
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Get version from app.json
        id: version
        run: echo "VERSION=$(node -p "require('./app.json').expo.version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: FuelAmpel v${{ steps.version.outputs.VERSION }}
          body: |
            ## ⛽ FuelAmpel v${{ steps.version.outputs.VERSION }}

            ### 🆕 本次更新 (What's New)
            - 📌 **Settings 固定右上角** — 设置齿轮按钮不再随页面滚动，始终固定在右上角
            - 🌍 **德/英双语支持** — Settings 顶部新增语言切换（Deutsch 默认），所有 UI 文字即时切换
            - ✨ **消除油量动画闪烁** — 加油后 ShadowTankBar↔TankGaugeSlider 过渡改为双层叠加淡入淡出，彻底告别闪烁感
            - 📐 **消除 Undo 布局跳动** — Undo/Skip 等按钮不再因 Undo 行出现而位移
            - 🗺️ **地图相机修复** — 点击加油站 Marker 后地图不再弹回用户位置
            - 👆 **Marker 点击区域扩大** — 加油站 Marker 触控区域确保 ≥44×44pt（Android Material 标准）

            ### 安装方法 (Installation)
            1. 下载附件中的 `app-release.apk`
            2. 手机允许「安装未知来源应用」
            3. 点开 APK 直接安装
          files: android/app/build/outputs/apk/release/app-release.apk
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
