name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant Gradle execute permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Android APK (Release)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version from app.json
        id: version
        run: echo "VERSION=$(node -p "require('./app.json').expo.version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: FuelAmpel v${{ steps.version.outputs.VERSION }}
          body: |
            ## ⛽ FuelAmpel v${{ steps.version.outputs.VERSION }}

            ### 本次更新 (What's New)
            - 🔴🟡🟢 V1 智能决策引擎：综合加权评分 + 3% 好价阈值 + 16-19点时段窗口
            - 💬 轻量级油量确认弹窗 (5天双重防骚扰锁)
            - ✨ 金色小车高亮动效引导用户调整油量
            - 🐛 修复 useEffect 未导入导致的崩溃
            - 📦 versionCode 升级至 2

            ### 安装方法 (Installation)
            1. 下载附件中的 `app-release.apk`
            2. 手机允许"安装未知来源应用"
            3. 点开 APK 直接安装
          files: android/app/build/outputs/apk/release/app-release.apk
          make_latest: true
