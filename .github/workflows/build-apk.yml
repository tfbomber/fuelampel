name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project (Expo Prebuild)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Grant Gradle execute permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Android APK (Release)
        working-directory: android
        env:
          # Fix: JVM Metaspace OOM caused packageRelease to crash (512MB default is insufficient)
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError"
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Get version from app.json
        id: version
        run: echo "VERSION=$(node -p "require('./app.json').expo.version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: FuelAmpel v${{ steps.version.outputs.VERSION }}
          body: |
            ## ⛽ FuelAmpel v${{ steps.version.outputs.VERSION }}

            ### 🆕 本次更新 — UI/UX 稳定性修复 (v2.8.1)
            - ⌨️ **键盘遮挡修复** — 首页加油输入框 & 设置页高级输入框不再被弹出键盘遮住（`KeyboardAvoidingView`）
            - 📍 **地址搜索结果可点击** — 修复了设置页 Home 地址搜索列表被 Work 输入框覆盖的 Z-Index Bug
            - 🗺️ **加油站页搜索建议修复** — 搜索遮罩层不再拦截联想结果点击（`locBackdrop zIndex: -1`）
            - 🎯 **地图切换按钮精准居中** — 修复 Android 上 FAB 按钮因百分比定位偏移的 Layout Bug
            - 📱 **小屏设备适配** — 红绿灯图标响应式缩放，iPhone SE / 360dp 小屏"加油"按钮不再被挤出首屏
            - 🚗 **油量滑块精准度提升** — 滚动页面后拖拽滑块不再有位置漂移（每次触摸前重测绝对坐标）
            - 💬 **行程确认卡片优化** — 三按钮布局从横排改为 1+2 组合，防止德语长单词截断
            - 💰 **价格显示防溢出** — 系统大字号下价格文字不再与品牌标签重叠

            ### 安装方法 (Installation)
            1. 下载附件中的 `app-release.apk`
            2. 手机允许「安装未知来源应用」
            3. 点开 APK 直接安装
          files: android/app/build/outputs/apk/release/app-release.apk
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
